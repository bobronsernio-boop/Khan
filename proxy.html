<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Proxy Loader</title>
<style>
body { margin:0; background:#000; display:flex; align-items:center; justify-content:center; height:100vh; color:#fff; font-family:sans-serif; }
#status { font-size:20px; }
</style>
</head>
<body>
<div id="status">Loading proxy engine...</div>
<script>
  // Load Scramjet bundle from CDN or local
  const script = document.createElement('script');
  script.src = 'https://yourcdn.com/scramjet.bundle.js'; // Host your bundle here
  document.head.appendChild(script);
  script.onload = () => {
    // Initialize Scramjet
    if (window.ScramjetController) {
      const { ScramjetController } = window;
      const ctrl = new ScramjetController({
        prefix: '/scram/',
        files: {
          wasm: '/scram/scramjet.wasm.wasm',
          all: '/scram/scramjet.all.js',
          sync: '/scram/scramjet.sync.js'
        },
        flags: {
          strictRewrites: true,
          captureErrors: true
        }
      });
      ctrl.init().then(() => {
        // Create iframe and load target URL
        const iframe = document.createElement('iframe');
        iframe.style.width='100%';
        iframe.style.height='100%';
        iframe.style.border='none';
        document.body.innerHTML=''; // clear loading text
        document.body.appendChild(iframe);
        ctrl.createFrame(iframe);
        // Navigate to last target page or default
        const targetUrl = localStorage.getItem('xnTargetUrl') || 'https://classroom.google.com';
        ctrl.getFrame().navigate(targetUrl);
      });
    }
  };
</script>
</body>
</html>
